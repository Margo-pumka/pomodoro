services:

  db-test:
    image: postgres:16.2
    restart: always
    shm_size: 128mb
    ports:
      - '5433:5432'
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: pomodoro

  cache-test:
    image: redis:7.2.4-alpine
    restart: always
    ports:
      - '6380:6379'
